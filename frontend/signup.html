<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Clean Connect Sign Up</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <meta name="author" content="Clean Connect Team">
        <style>
            .signup-container {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
            }
            .signup-card {
                background-color: #fff;
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.1);
                width: 100%;
                max-width: 400px;
            }
            .signup-card h2 {
                color: #014c01f3;
                text-align: center;
                margin-bottom: 30px;
                font-size: 28px;
            }
            .form-group {
                display: flex;
                flex-direction: column;
                margin-bottom: 20px;
            }
            .form-group label {
                color: #014c01f3;
                margin-bottom: 8px;
                font-weight: 500;
                font-size: 14px;
            }
            .form-group input {
                padding: 12px;
                border: 1.5px solid #d0d0d0;
                border-radius: 8px;
                font-size: 14px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                transition: border-color 0.3s ease;
            }
            .form-group input:focus {
                outline: none;
                border-color: #014c01f3;
                box-shadow: 0 0 0 3px rgba(1, 76, 1, 0.1);
            }
            .signup-btn {
                width: 100%;
                padding: 12px;
                background-color: #014c01f3;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.3s ease;
                margin-top: 10px;
            }
            .signup-btn:hover {
                background-color: #013001f3;
            }
            .signup-btn:disabled {
                background-color: #ccc;
                cursor: not-allowed;
            }
            .error-message {
                color: #d32f2f;
                background-color: #ffebee;
                padding: 12px;
                border-radius: 8px;
                margin-bottom: 15px;
                text-align: center;
                display: none;
                font-size: 14px;
            }
            .success-message {
                color: #2e7d32;
                background-color: #e8f5e9;
                padding: 12px;
                border-radius: 8px;
                margin-bottom: 15px;
                text-align: center;
                display: none;
                font-size: 14px;
            }
            .login-link {
                text-align: center;
                margin-top: 20px;
                color: #666;
                font-size: 14px;
            }
            .login-link a {
                color: #014c01f3;
                text-decoration: none;
                font-weight: 600;
            }
            .login-link a:hover {
                text-decoration: underline;
            }
            .main {
                width: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 0;
                background-color: #f5f5f5;
            }
        </style>
    </head>
    <body style="background-color: #025a02dd; margin: 0; padding: 0;">
        <header style="background-color: #025a02dd; color: white; padding: 20px; text-align: center; margin: 0;">
            <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 32px; margin: 0; color: white;">
                <svg xmlns="http://www.w3.org/2000/svg" 
                fill="none" 
                viewBox="0 0 24 24" 
                stroke-width="1.5" 
                stroke="currentColor" 
                width="40px"
                height="40px"
                style="color: white; stroke: white;">
                <path stroke-linecap="round" 
                stroke-linejoin="round" 
                d="M15.042 21.672 13.684 16.6m0 0-2.51 2.225.569-9.47 5.227 7.917-3.286-.672ZM12 2.25V4.5m5.834.166-1.591 1.591M20.25 10.5H18M7.757 14.743l-1.59 1.59M6 10.5H3.75m4.007-4.243-1.59-1.59" />
                </svg>
                CleanConnect
            </h1>
        </header>
        <div class="signup-container">
            <div class="signup-card">
                <h2>Create Account</h2>
                    <div class="error-message" id="errorMessage"></div>
                    <div class="success-message" id="successMessage"></div>
                    <form id="signupForm">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" required placeholder="Choose a username">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required placeholder="Create a strong password">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
                        </div>
                        <button type="submit" class="signup-btn" id="signupBtn">Sign Up</button>
                    </form>
                    <div class="login-link">
                        Already have an account? <a href="login.html">Sign in here</a>
                    </div>
                </div>
            </div>

        <script>
            const signupForm = document.getElementById('signupForm');
            const signupBtn = document.getElementById('signupBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Clear previous messages
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
                errorMessage.textContent = '';
                successMessage.textContent = '';

                // Get form values
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // Validate passwords match
                if (password !== confirmPassword) {
                    errorMessage.textContent = 'Passwords do not match.';
                    errorMessage.style.display = 'block';
                    return;
                }

                // Validate password length
                if (password.length < 6) {
                    errorMessage.textContent = 'Password must be at least 6 characters long.';
                    errorMessage.style.display = 'block';
                    return;
                }

                // Disable button during request
                signupBtn.disabled = true;
                signupBtn.textContent = 'Creating Account...';

                try {
                    const response = await fetch('http://localhost:8000/auth/signup', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            password: password
                        })
                    });

                    if (response.ok) {
                        // Show success message
                        successMessage.textContent = 'Account created successfully! Redirecting to login...';
                        successMessage.style.display = 'block';

                        // Redirect to login page after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        errorMessage.textContent = errorData.detail || 'Sign up failed. Please try again.';
                        errorMessage.style.display = 'block';
                        
                        // Re-enable button
                        signupBtn.disabled = false;
                        signupBtn.textContent = 'Sign Up';
                    }
                } catch (error) {
                    console.error('Error:', error);
                    errorMessage.textContent = 'Connection error. Please try again.';
                    errorMessage.style.display = 'block';
                    
                    // Re-enable button
                    signupBtn.disabled = false;
                    signupBtn.textContent = 'Sign Up';
                }
            });
        </script>
    </body>
</html>
