<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clean Connect Home</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <meta name="author" content="Clean Connect Team">
    <style>
        .home-container {
            padding: 20px;
        }
        .welcome-card {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .welcome-card h2 {
            color: #014c01f3;
            margin-bottom: 20px;
        }
        .user-info {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .user-info p {
            margin: 5px 0;
            color: #333;
        }
        .logout-btn {
            background-color: #d32f2f;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .logout-btn:hover {
            background-color: #b71c1c;
        }
        .report-section {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .report-section h3 {
            color: #014c01f3;
            margin-bottom: 20px;
        }
        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            color: #014c01f3;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            padding: 10px;
            border: 1px solid #d0d0d0;
            border-radius: 5px;
            font-family: inherit;
        }
        .upload-btn {
            background-color: #014c01f3;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .upload-btn:hover {
            background-color: #013001f3;
        }
        .upload-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }
        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        .error {
            background-color: #ffebee;
            color: #d32f2f;
        }
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .report-card {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .report-card img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        /* Hero / banner */
        .hero {
            position: relative;
            height: 260px;
            background: linear-gradient(135deg, #1e5c2b 0%, #a0d18b 60%, #e8f5e9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255,255,255,0.4), rgba(255,255,255,0));
            opacity: 0.6;
        }

        .hero-content {
            position: relative;
            text-align: center;
            color: #0b2f0e;
            padding: 0 20px;
        }

        .hero-content h1 {
            font-size: 34px;
            margin-bottom: 10px;
        }

        .hero-content p {
            font-size: 16px;
            opacity: 0.9;
        }

        .dashboard-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .dashboard-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .dashboard-card h2 {
            margin-top: 0;
            color: #014c01f3;
            margin-bottom: 12px;
        }

        .feed-section {
            margin-bottom: 30px;
        }

        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
        }

        .feed-header h2 {
            margin: 0;
            font-size: 22px;
            color: #014c01f3;
        }

        .feed-header span {
            color: #666;
            font-size: 14px;
        }

        .fab {
            position: fixed;
            right: 30px;
            bottom: 30px;
            width: 56px;
            height: 56px;
            background-color: #014c01f3;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            text-decoration: none;
            box-shadow: 0 14px 30px rgba(0,0,0,0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .fab:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(0,0,0,0.3);
        }
    </style>
</head>

    <script>
        // Check if user is logged in
        const accessToken = localStorage.getItem('access_token');
        if (!accessToken) {
            window.location.href = 'login.html';
        }

        // Load user info on page load
        loadUserInfo();

        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('http://localhost:8000/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('heroName').textContent = user.username;
                } else {
                    // Token might be expired, try refresh
                    await refreshToken();
                }
            } catch (error) {
                console.error('Error loading user info:', error);
            }
        }

        // Refresh token
        async function refreshToken() {
            const refreshToken = localStorage.getItem('refresh_token');
            if (!refreshToken) {
                logout();
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/auth/refresh', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${refreshToken}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access_token);
                    loadUserInfo(); // Retry loading user info
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Error refreshing token:', error);
                logout();
            }
        }

        // Logout function
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('token_type');
            localStorage.removeItem('user_email');
            window.location.href = 'login.html';
        }

        // Logout button
        document.getElementById('logoutBtn').addEventListener('click', logout);

        // Get current location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        document.getElementById('latitude').value = position.coords.latitude;
                        document.getElementById('longitude').value = position.coords.longitude;
                    },
                    (error) => {
                        console.error('Error getting location:', error);
                        alert('Unable to get your location. Please enter coordinates manually.');
                    }
                );
            } else {
                alert('Geolocation is not supported by this browser.');
            }
        }

        // Auto-fill location when page loads
        getLocation();

        // Report form submission
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('image', document.getElementById('image').files[0]);
            formData.append('latitude', document.getElementById('latitude').value);
            formData.append('longitude', document.getElementById('longitude').value);
            formData.append('description', document.getElementById('description').value);

            const uploadBtn = document.getElementById('uploadBtn');
            const message = document.getElementById('message');
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            message.style.display = 'none';

            try {
                const response = await fetch('http://localhost:8000/reports/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    },
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    message.textContent = 'Report submitted successfully!';
                    message.className = 'message success';
                    message.style.display = 'block';
                    document.getElementById('reportForm').reset();
                    getLocation(); // Reset location
                } else {
                    const error = await response.json();
                    message.textContent = error.detail || 'Failed to submit report.';
                    message.className = 'message error';
                    message.style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                message.textContent = 'Connection error. Please try again.';
                message.className = 'message error';
                message.style.display = 'block';
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Submit Report';
            }
        });

        // Load user info + community feed on page load
        loadUserInfo();
        loadFeed();

        // Function to load the community feed
        async function loadFeed() {
            try {
                const response = await fetch('http://localhost:8000/reports/feed', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                });
                
                if (response.ok) {
                    const reports = await response.json();
                    displayFeed(reports);
                } else if (response.status === 401) {
                    await refreshToken();
                    loadFeed(); // Retry
                } else {
                    document.getElementById('feedList').innerHTML = 'Failed to load feed.';
                }
            } catch (error) {
                console.error('Error loading feed:', error);
                document.getElementById('feedList').innerHTML = 'Error loading feed.';
            }
        }

        // Function to display feed items
        function displayFeed(reports) {
            const feedList = document.getElementById('feedList');
            if (reports.length === 0) {
                feedList.innerHTML = 'No reports yet. Be the first to report!';
                return;
            }

            let html = '';
            reports.forEach(report => {
                html += `
                    <div class="report-card">
                        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <div>
                                <strong>${report.username}</strong>
                                <div style="font-size: 12px; color: #555;">${new Date(report.created_at).toLocaleString()}</div>
                            </div>
                            <span style="font-size: 12px; color: #388e3c;">${report.status}</span>
                        </div>
                        <img src="${report.image_url}" alt="Report image">
                        <p style="margin: 10px 0 4px;"><strong>Description:</strong> ${report.description || 'No description'}</p>
                        <p style="margin: 0; font-size: 13px; color: #555;">Location: ${report.latitude.toFixed(4)}, ${report.longitude.toFixed(4)}</p>
                    </div>
                `;
            });
            feedList.innerHTML = html;
        }
    </script>
