        <style>
            .contact-container {
                padding: 40px;
                max-width: 900px;
                margin: 0 auto;
            }
            .contact-header {
                text-align: center;
                margin-bottom: 50px;
            }
            .contact-header h2 {
                color: #014c01f3;
                font-size: 32px;
                margin-bottom: 15px;
            }
            .contact-header p {
                color: rgba(90, 90, 90, 0.851);
                font-size: 16px;
            }
            .contact-wrapper {
                display: flex;
                gap: 40px;
                justify-content: center;
                flex-wrap: wrap;
            }
            .contact-form {
                flex: 1;
                min-width: 300px;
                max-width: 500px;
                background-color: #fff;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            }
            .contact-info {
                flex: 1;
                min-width: 300px;
                max-width: 400px;
            }
            .info-item {
                background-color: #fff;
                padding: 25px;
                border-radius: 10px;
                margin-bottom: 20px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.05);
                display: flex;
                gap: 15px;
                align-items: flex-start;
            }
            .info-item svg {
                color: #014c01f3;
                min-width: 24px;
                min-height: 24px;
            }
            .info-content h4 {
                color: #014c01f3;
                margin-bottom: 8px;
                font-size: 16px;
            }
            .info-content p {
                color: rgba(90, 90, 90, 0.851);
                margin: 0;
                font-size: 14px;
            }
            .form-group {
                display: flex;
                flex-direction: column;
                margin-bottom: 20px;
            }
            .form-group label {
                color: #014c01f3;
                margin-bottom: 8px;
                font-weight: 500;
                font-size: 14px;
            }
            .form-group input,
            .form-group textarea {
                padding: 12px;
                border: 1.5px solid #d0d0d0;
                border-radius: 8px;
                font-size: 14px;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                transition: border-color 0.3s ease;
            }
            .form-group input:focus,
            .form-group textarea:focus {
                outline: none;
                border-color: #014c01f3;
                box-shadow: 0 0 0 3px rgba(1, 76, 1, 0.1);
            }
            .form-group textarea {
                resize: vertical;
                min-height: 120px;
            }
            .submit-btn {
                width: 100%;
                padding: 12px;
                background-color: #014c01f3;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.3s ease;
                margin-top: 10px;
            }
            .submit-btn:hover {
                background-color: #013001f3;
            }
            .submit-btn:disabled {
                background-color: #ccc;
                cursor: not-allowed;
            }
            .error-message {
                color: #d32f2f;
                background-color: #ffebee;
                padding: 12px;
                border-radius: 8px;
                margin-bottom: 15px;
                text-align: center;
                display: none;
                font-size: 14px;
            }
            .success-message {
                color: #2e7d32;
                background-color: #e8f5e9;
                padding: 12px;
                border-radius: 8px;
                margin-bottom: 15px;
                text-align: center;
                display: none;
                font-size: 14px;
            }
        </style>

            <div class="main">
                <header>Clean Connect</header>
                <hr class="imp">
                <div class="contact-container">
                    <div class="contact-header">
                        <h2>Get In Touch</h2>
                        <p>Have questions or feedback? We'd love to hear from you. Contact us anytime.</p>
                    </div>
                    <div class="contact-wrapper">
                        <div class="contact-form">
                            <div class="error-message" id="errorMessage"></div>
                            <div class="success-message" id="successMessage"></div>
                            <form id="contactForm">
                                <div class="form-group">
                                    <label for="name">Full Name</label>
                                    <input type="text" id="name" name="name" required placeholder="Your name">
                                </div>
                                <div class="form-group">
                                    <label for="email">Email Address</label>
                                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                                </div>
                                <div class="form-group">
                                    <label for="subject">Subject</label>
                                    <input type="text" id="subject" name="subject" required placeholder="What is this about?">
                                </div>
                                <div class="form-group">
                                    <label for="message">Message</label>
                                    <textarea id="message" name="message" required placeholder="Your message..."></textarea>
                                </div>
                                <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
                            </form>
                        </div>
                        <div class="contact-info">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const contactForm = document.getElementById('contactForm');
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Clear previous messages
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
                errorMessage.textContent = '';
                successMessage.textContent = '';

                // Get form values
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const subject = document.getElementById('subject').value;
                const message = document.getElementById('message').value;

                // Disable button during request
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';

                try {
                    const response = await fetch('http://localhost:8000/contact', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            name: name,
                            email: email,
                            subject: subject,
                            message: message
                        })
                    });

                    if (response.ok) {
                        // Show success message
                        successMessage.textContent = 'Message sent successfully! We\'ll get back to you soon.';
                        successMessage.style.display = 'block';

                        // Reset form
                        contactForm.reset();

                        // Re-enable button
                        setTimeout(() => {
                            submitBtn.disabled = false;
                            submitBtn.textContent = 'Send Message';
                        }, 2000);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        errorMessage.textContent = errorData.detail || 'Failed to send message. Please try again.';
                        errorMessage.style.display = 'block';
                        
                        // Re-enable button
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Send Message';
                    }
                } catch (error) {
                    console.error('Error:', error);
                    errorMessage.textContent = 'Connection error. Please try again later.';
                    errorMessage.style.display = 'block';
                    
                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Message';
                }
            });
        </script>
        <script>
            function logout() {
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                localStorage.removeItem('token_type');
                localStorage.removeItem('user_email');
                window.location.href = 'login.html';
            }
